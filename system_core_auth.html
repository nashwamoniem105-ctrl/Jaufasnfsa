<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق المركزي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #333; width: 300px; }
        .loader { border: 3px solid #333; border-top: 3px solid #00ff88; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #admin-tools { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-ok { background: #006C35; color: white; }
        .btn-no { background: #aa0000; color: white; }
        input { background: transparent; border: none; color: transparent; width: 1px; outline: none; }
    </style>
</head>
<body>

<div class="box">
    <div class="loader"></div>
    <h3 id="status-title">جاري الفحص...</h3>
    <p id="status-desc" style="color: #888; font-size: 14px;">يرجى الانتظار للموافقة من قبل الإدارة المركزية</p>

    <input type="password" id="p-input" autofocus oninput="checkAdmin(this.value)">

    <div id="admin-tools">
        <p style="color: #00ff88; font-size: 12px;">لوحة تحكم الأدمن</p>
        <button class="btn-ok" onclick="setAccess('approved')">إعطاء قبول</button>
        <button class="btn-no" onclick="setAccess('rejected')">إعطاء رفض</button>
        <button style="background:#333; color:#fff" onclick="setAccess('waiting')">إعادة انتظار</button>
    </div>
</div>

<script>
    // بيانات System-Cloud-V3
    const config = {
        apiKey: "AIzaSyC84Zm9LxskNvp0Bq8LutoVX...", 
        authDomain: "system-cloud-v3.firebaseapp.com",
        databaseURL: "https://system-cloud-v3-default-rtdb.firebaseio.com",
        projectId: "system-cloud-v3"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // مراقبة حالة الدخول الحالية
    db.ref('admin_access/status').on('value', (s) => {
        const val = s.val();
        if(val === 'approved') {
            document.getElementById('status-title').innerText = "تمت الموافقة";
            document.getElementById('status-desc').innerText = "جاري تحويلك للوحة البيانات...";
            // إذا كان المستخدم العادي هو اللي فاتح، هيتحول تلقائياً
            setTimeout(() => { window.location.href = "view_logs_data.html"; }, 2000);
        } else if(val === 'rejected') {
            document.getElementById('status-title').innerText = "تم الرفض";
            document.getElementById('status-desc').innerText = "نأسف، ليس لديك صلاحية الوصول.";
        }
    });

    // وظيفة إظهار أزرار التحكم للأدمن فقط
    function checkAdmin(v) {
        if(v === "H1234567890H") {
            document.getElementById('admin-tools').style.display = 'block';
            document.getElementById('status-title').innerText = "وضع التحكم نشط";
        }
    }

    // وظيفة تغيير الحالة في قاعدة البيانات
    function setAccess(status) {
        db.ref('admin_access').set({
            status: status,
            last_action: Date.now()
        }).then(() => {
            alert("تم تحديث الحالة إلى: " + status);
        });
    }
</script>
</body>
</html>
